# A quiet place to read Markdown

Markdown became the paper of the AI age — plans, reports, READMEs, agent logs. This document exercises **every rendering path** so we can judge the whole system at a glance: *emphasis*, **strength**, ***both***, `inline code`, ~~strikethrough~~, and a [link to somewhere](https://thesis.do) with a spectral hover.

Typographer niceties work too -- dashes, "smart quotes", ellipses... and (c) symbols.

## Structure and rhythm

Body text wants a calm measure, generous leading, and headings that assert without shouting. Here's a second paragraph to check paragraph spacing against the baseline rhythm of the page. It should feel like a well-set book page, not a wiki.

## Code, in the brand's spectral palette

```swift
struct Document: Identifiable {
    let id = UUID()
    var title: String
    var body: String

    /// Estimated reading time in minutes.
    var readingMinutes: Int {
        max(1, body.split(separator: " ").count / 225)
    }
}
```

```python
def spectral(colors: list[str]) -> str:
    """Join brand colors into a gradient stop list."""
    return ", ".join(f"{c}" for c in colors)

print(spectral(["#ff5d73", "#ffb454", "#36d6c3", "#6aa6ff", "#b07bff"]))
```
